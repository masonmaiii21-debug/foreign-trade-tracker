<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>海运操作管理系统</title>
<style>
:root {
  --bg: #060b14; --bg2: #0b1222;
  --surface: rgba(12,20,40,0.9); --surface2: rgba(16,28,52,0.7);
  --line: rgba(0,229,255,0.12); --line-glow: rgba(0,229,255,0.3);
  --text: #dce6f0; --text-bright: #f0f5ff; --muted: #5a6d8a;
  --neon: #00e5ff; --neon-dim: #0097a7; --neon-glow: rgba(0,229,255,0.2);
  --accent: #ff6d3a; --accent-glow: rgba(255,109,58,0.25);
  --danger: #ff4060; --success: #00e676; --warning: #ffb300;
  --purple: #b388ff;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

@keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:"Microsoft YaHei","PingFang SC","Segoe UI",sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh; position:relative; overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px);
  background-size:48px 48px;
}

/* Header */
.header {
  background:linear-gradient(135deg, #020b1a, #0a1a35, #0d2045); color:#fff;
  padding:14px 28px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
  position:relative; z-index:1; border-bottom:1px solid var(--line);
}
.header h1 { font-size:20px; background:linear-gradient(135deg,#fff,#b0d8ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header .subtitle { font-size:11px; color:var(--muted); letter-spacing:0.5px; }

/* Layout */
.app { display:grid; grid-template-columns:340px 1fr; min-height:calc(100vh - 62px); position:relative; z-index:1; }

/* Sidebar */
.sidebar {
  background:linear-gradient(180deg, rgba(8,16,32,0.96), rgba(10,18,36,0.92));
  border-right:1px solid var(--line); padding:14px; display:flex; flex-direction:column; gap:10px;
  max-height:calc(100vh - 62px); overflow-y:auto; backdrop-filter:blur(12px);
}
.sidebar .sec-title { font-size:13px; color:var(--text-bright); text-transform:uppercase; letter-spacing:1.5px; display:flex; justify-content:space-between; align-items:center; }
.shipment-count { font-size:11px; color:var(--neon); background:var(--neon-glow); padding:2px 10px; border-radius:99px; font-family:"Consolas","Courier New",monospace; }

.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:5px;
  min-height:32px; padding:0 12px; border-radius:4px; font-size:11px; cursor:pointer;
  letter-spacing:0.5px; text-transform:uppercase; transition:all 0.2s;
  border:1px solid rgba(0,229,255,0.2); background:rgba(0,229,255,0.05); color:var(--neon);
}
.btn:hover { border-color:var(--neon); box-shadow:0 0 12px var(--neon-glow); }
.btn.primary { background:rgba(0,229,255,0.12); border-color:var(--neon); box-shadow:0 0 10px var(--neon-glow); }
.btn.accent { background:rgba(255,109,58,0.1); color:var(--accent); border-color:rgba(255,109,58,0.4); }
.btn.danger { color:var(--danger); border-color:rgba(255,64,96,0.3); background:rgba(255,64,96,0.04); }
.btn.danger:hover { background:rgba(255,64,96,0.12); box-shadow:0 0 12px rgba(255,64,96,0.2); }
.btn.small { min-height:24px; padding:0 8px; font-size:10px; }
.btn-group { display:flex; gap:5px; flex-wrap:wrap; }

.search-box input {
  width:100%; min-height:34px; padding:6px 10px; background:rgba(0,10,30,0.6);
  border:1px solid rgba(0,229,255,0.12); border-radius:4px; color:var(--text-bright); font-size:12px;
}
.search-box input:focus { outline:none; border-color:var(--neon); box-shadow:0 0 8px var(--neon-glow); }
.search-box input::placeholder { color:rgba(90,109,138,0.5); }

/* Shipment list cards */
.ship-list { display:flex; flex-direction:column; gap:4px; flex:1; overflow-y:auto; }
.ship-card {
  border:1px solid rgba(0,229,255,0.08); border-radius:4px; padding:10px; cursor:pointer;
  transition:all 0.2s; background:rgba(0,229,255,0.02); position:relative;
}
.ship-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--neon); opacity:0; transition:opacity 0.2s; }
.ship-card:hover { border-color:var(--line-glow); background:rgba(0,229,255,0.04); }
.ship-card:hover::before { opacity:1; }
.ship-card.active { border-color:var(--neon); background:rgba(0,229,255,0.05); box-shadow:0 0 10px var(--neon-glow); }
.ship-card.active::before { opacity:1; }
.ship-card .top { display:flex; justify-content:space-between; align-items:flex-start; }
.ship-card .bl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.ship-card strong { font-size:13px; color:var(--text-bright); display:block; }
.ship-card .stage-badge { font-size:10px; padding:2px 7px; border-radius:99px; }
.ship-card .stage-badge.active { background:rgba(0,229,255,0.12); color:var(--neon); }
.ship-card .stage-badge.done { background:rgba(0,230,118,0.1); color:var(--success); }
.ship-card .stage-badge.issue { background:rgba(255,64,96,0.1); color:var(--danger); }

/* Main */
.main { padding:18px; overflow-y:auto; max-height:calc(100vh - 62px); }

/* Tabs */
.tab-bar { display:flex; gap:1px; margin-bottom:16px; background:rgba(0,229,255,0.03); border:1px solid var(--line); border-radius:4px; padding:2px; }
.tab { padding:8px 18px; cursor:pointer; border:none; background:none; font-size:12px; font-weight:600; color:var(--muted); border-radius:3px; transition:all 0.2s; letter-spacing:0.5px; }
.tab:hover { color:var(--text); }
.tab.active { color:var(--neon); background:rgba(0,229,255,0.08); box-shadow:0 0 8px var(--neon-glow); }
.tab-content { display:none; animation:fadeInUp 0.3s ease; }
.tab-content.active { display:block; }

/* Panels */
.panel { background:var(--surface); border:1px solid var(--line); border-radius:4px; box-shadow:var(--shadow); margin-bottom:14px; backdrop-filter:blur(8px); }
.panel-header { padding:12px 16px; border-bottom:1px solid rgba(0,229,255,0.08); display:flex; justify-content:space-between; align-items:center; }
.panel-header h3 { font-size:12px; color:var(--text-bright); text-transform:uppercase; letter-spacing:1px; }
.panel-body { padding:14px; }

/* Form */
.form-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.form-grid.col3 { grid-template-columns:repeat(3,1fr); }
.form-grid.col2 { grid-template-columns:repeat(2,1fr); }
.form-grid label { display:flex; flex-direction:column; gap:4px; font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; }
.form-grid input, .form-grid select, .form-grid textarea {
  min-height:34px; padding:6px 8px; border:1px solid rgba(0,229,255,0.12); border-radius:3px;
  font-size:12px; background:rgba(0,10,30,0.5); color:var(--text-bright); transition:all 0.2s;
  font-family:inherit;
}
.form-grid textarea { min-height:60px; resize:vertical; }
.form-grid input:focus, .form-grid select:focus, .form-grid textarea:focus { outline:none; border-color:var(--neon); box-shadow:0 0 8px var(--neon-glow); }
.form-grid select option { background:#0a1a35; color:var(--text); }
.form-actions { display:flex; gap:8px; margin-top:12px; }

/* Process Chain */
.process-chain { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.process-node {
  border:1px solid rgba(0,229,255,0.08); border-radius:4px; padding:10px; cursor:pointer;
  transition:all 0.2s; background:rgba(0,0,0,0.2); position:relative; min-height:90px;
  display:flex; flex-direction:column; gap:6px;
}
.process-node:hover { border-color:var(--line-glow); }
.process-node.current { border-color:var(--neon); background:rgba(0,229,255,0.06); box-shadow:0 0 10px var(--neon-glow); }
.process-node.done { border-color:rgba(0,230,118,0.3); background:rgba(0,230,118,0.04); }
.process-node.done .node-num { background:var(--success); color:#000; }
.process-node.issue { border-color:rgba(255,64,96,0.4); background:rgba(255,64,96,0.04); }
.process-node .node-num { width:26px; height:26px; border-radius:50%; background:rgba(0,229,255,0.12); color:var(--neon); display:grid; place-items:center; font-size:11px; font-weight:800; flex-shrink:0; }
.process-node .node-name { font-size:11px; font-weight:700; color:var(--text-bright); }
.process-node .node-status { font-size:9px; padding:1px 6px; border-radius:99px; align-self:flex-start; }
.process-node .node-status.pending { background:rgba(90,109,138,0.15); color:var(--muted); }
.process-node .node-status.ongoing { background:rgba(0,229,255,0.1); color:var(--neon); }
.process-node .node-status.done { background:rgba(0,230,118,0.1); color:var(--success); }
.process-node .node-status.problem { background:rgba(255,64,96,0.1); color:var(--danger); }
.process-node .node-date { font-size:9px; color:var(--muted); }

/* Document checklist */
.doc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.doc-item { display:flex; align-items:center; gap:8px; padding:8px 10px; background:rgba(0,0,0,0.15); border:1px solid rgba(0,229,255,0.06); border-radius:3px; }
.doc-item .doc-check { width:18px; height:18px; border-radius:3px; accent-color:var(--success); cursor:pointer; }
.doc-item .doc-name { font-size:11px; }
.doc-item .doc-status { font-size:9px; margin-left:auto; padding:2px 6px; border-radius:99px; }
.doc-item .doc-status.ok { background:rgba(0,230,118,0.1); color:var(--success); }
.doc-item .doc-status.wait { background:rgba(255,179,0,0.1); color:var(--warning); }

/* Cost table */
.cost-table { width:100%; border-collapse:collapse; font-size:11px; }
.cost-table th { background:rgba(0,15,35,0.6); padding:8px; text-align:left; font-size:9px; color:var(--neon); border-bottom:1px solid rgba(0,229,255,0.12); text-transform:uppercase; letter-spacing:1px; }
.cost-table td { padding:8px; border-bottom:1px solid rgba(0,229,255,0.05); }
.cost-table .num { text-align:right; font-family:"Consolas","Courier New",monospace; }
.cost-table tfoot td { font-weight:700; color:var(--accent); border-top:1px solid rgba(255,109,58,0.3); }

/* Issue list */
.issue-card { border:1px solid rgba(255,64,96,0.1); border-radius:3px; padding:10px; margin-bottom:6px; background:rgba(255,64,96,0.03); display:flex; gap:10px; align-items:flex-start; }
.issue-card .sev { padding:2px 7px; border-radius:99px; font-size:9px; font-weight:700; }
.issue-card .sev.critical { background:rgba(255,64,96,0.15); color:var(--danger); }
.issue-card .sev.major { background:rgba(255,179,0,0.12); color:var(--warning); }
.issue-card .sev.minor { background:rgba(0,229,255,0.1); color:var(--neon); }
.issue-card .body { flex:1; }
.issue-card .body p { font-size:12px; margin:0 0 4px; }
.issue-card .body small { color:var(--muted); font-size:10px; }

/* Badge / pill */
.badge { display:inline-flex; font-size:9px; padding:2px 7px; border-radius:99px; font-weight:600; letter-spacing:0.5px; }
.badge.neon { background:rgba(0,229,255,0.1); color:var(--neon); }
.badge.green { background:rgba(0,230,118,0.1); color:var(--success); }
.badge.red { background:rgba(255,64,96,0.1); color:var(--danger); }
.badge.amber { background:rgba(255,179,0,0.1); color:var(--warning); }

.empty-state { text-align:center; padding:50px 20px; color:var(--muted); }
.empty-state .icon { font-size:40px; margin-bottom:10px; opacity:0.4; }
.empty-state h3 { font-size:16px; margin-bottom:6px; color:var(--text); }

/* Scrollbar */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:rgba(0,0,0,0.2); }
::-webkit-scrollbar-thumb { background:rgba(0,229,255,0.1); border-radius:2px; }
::-webkit-scrollbar-thumb:hover { background:rgba(0,229,255,0.2); }
::selection { background:rgba(0,229,255,0.2); color:#fff; }

@media (max-width:1100px) { .app { grid-template-columns:1fr; } .form-grid { grid-template-columns:repeat(2,1fr); } .process-chain { grid-template-columns:repeat(3,1fr); } .doc-grid { grid-template-columns:repeat(2,1fr); } }
@media (max-width:600px) { .form-grid { grid-template-columns:1fr; } .process-chain { grid-template-columns:repeat(2,1fr); } .doc-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<header class="header">
  <div>
    <h1>海运操作管理系统</h1>
    <div class="subtitle">Shipping Operations · 订舱 → 报关 → 装船 → 到港 → 送货 全流程追踪</div>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sec-title">📦 货物跟踪列表 <span class="shipment-count" id="shipmentCount">0</span></div>
    <div class="btn-group">
      <button class="btn primary small" onclick="newShipment()">+ 新建委托</button>
      <button class="btn accent small" onclick="loadDemo()">📋 加载示例</button>
    </div>
    <div class="search-box"><input id="searchInput" type="search" placeholder="搜索提单号/船名/客户..." oninput="renderShipList()" /></div>
    <div class="ship-list" id="shipList">
      <div class="empty-state" style="padding:24px 10px;"><div class="icon">🚢</div><p style="font-size:12px;">暂无委托<br>点击「新建委托」开始</p></div>
    </div>
    <div class="btn-group">
      <button class="btn small" onclick="exportData()">📥 导出数据</button>
      <label class="btn small" style="cursor:pointer;">📤 导入数据 <input id="importInput" type="file" accept="application/json" onchange="importData(event)" style="display:none;" /></label>
      <button class="btn danger small" onclick="clearAll()">🗑 清空</button>
    </div>
  </aside>

  <!-- Main -->
  <section class="main">
    <!-- Tabs -->
    <div class="tab-bar" id="mainTabs">
      <button class="tab active" data-tab="detail">📋 委托详情</button>
      <button class="tab" data-tab="process">📍 操作流程</button>
      <button class="tab" data-tab="docs">📄 单证管理</button>
      <button class="tab" data-tab="cost">💰 费用明细</button>
      <button class="tab" data-tab="issues">⚠️ 问题记录</button>
    </div>

    <div class="empty-state" id="emptyState">
      <div class="icon">📦</div>
      <h3>选择或新建货物委托</h3>
      <p>在左侧面板点击「新建委托」或选择一个已有委托开始操作</p>
    </div>

    <div id="editorArea" style="display:none;">

      <!-- Tab: 委托详情 -->
      <div class="tab-content active" id="tab-detail">
        <div class="panel">
          <div class="panel-header"><h3>📦 货物基本信息</h3></div>
          <div class="panel-body">
            <div class="form-grid">
              <label>委托号/提单号 <input id="fRef" placeholder="例如 BL-2026-001" /></label>
              <label>操作状态
                <select id="fStatus">
                  <option value="进行中">进行中</option><option value="已完成">已完成</option>
                  <option value="有异常">有异常</option><option value="已取消">已取消</option>
                </select>
              </label>
              <label>船公司 <input id="fCarrier" placeholder="例如 MAERSK / COSCO" /></label>
              <label>船名/航次 <input id="fVessel" placeholder="例如 EVER GLOBE / 2516W" /></label>
              <label>起运港 <input id="fPol" placeholder="例如 SHANGHAI" /></label>
              <label>目的港 <input id="fPod" placeholder="例如 ROTTERDAM" /></label>
              <label>ETD 预计开船 <input id="fEtd" type="date" /></label>
              <label>ETA 预计到港 <input id="fEta" type="date" /></label>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header"><h3>🧑‍💼 收发通信息</h3></div>
          <div class="panel-body">
            <div class="form-grid">
              <label>发货人 Shipper <input id="fShipper" placeholder="公司名称 / 地址" /></label>
              <label>收货人 Consignee <input id="fConsignee" placeholder="公司名称 / 地址" /></label>
              <label>通知方 Notify <input id="fNotify" placeholder="公司名称 / 地址" /></label>
              <label>货代/代理 <input id="fForwarder" placeholder="负责货代公司" /></label>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header"><h3>📦 货物与集装箱</h3></div>
          <div class="panel-body">
            <div class="form-grid">
              <label>品名 <input id="fCargo" placeholder="中英文品名" /></label>
              <label>HS编码 <input id="fHsCode" placeholder="例如 940360" /></label>
              <label>件数 / 包装 <input id="fPackages" placeholder="例如 200 CTNS" /></label>
              <label>毛重 (KGS) <input id="fGrossWeight" type="number" step="0.1" placeholder="例如 5600" /></label>
              <label>体积 (CBM) <input id="fCbm" type="number" step="0.01" placeholder="例如 28.5" /></label>
              <label>集装箱号 <input id="fCntrNo" placeholder="例如 MSKU1234567" /></label>
              <label>箱型
                <select id="fCntrType">
                  <option value="20GP">20GP</option><option value="40GP">40GP</option>
                  <option value="40HQ" selected>40HQ</option><option value="45HQ">45HQ</option>
                  <option value="20RF">20RF 冷柜</option><option value="40RF">40RF 冷柜</option>
                  <option value="20OT">20OT 开顶</option><option value="40OT">40OT 开顶</option>
                  <option value="LCL">拼箱 LCL</option>
                </select>
              </label>
              <label>封号 <input id="fSealNo" placeholder="例如 ABC12345" /></label>
              <label>Tare 皮重 (KGS) <input id="fTare" type="number" step="0.1" placeholder="例如 3800" /></label>
              <label>VGM (KGS) <input id="fVgm" type="number" step="0.1" placeholder="皮重+货重" /></label>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn primary" onclick="saveShipment()">💾 保存委托</button>
          <span id="saveHint" style="font-size:11px;color:var(--success);"></span>
        </div>
      </div>

      <!-- Tab: 操作流程 - 15 steps -->
      <div class="tab-content" id="tab-process">
        <div class="panel">
          <div class="panel-header"><h3>📍 海运操作流程追踪 (15步)</h3><span id="stepProgress" style="font-size:10px;color:var(--muted);"></span></div>
          <div class="panel-body">
            <div class="process-chain" id="processChain"></div>
            <div id="stepEditor" style="margin-top:14px;padding:14px;background:rgba(0,0,0,0.15);border:1px solid var(--line);border-radius:4px;display:none;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <h4 style="font-size:13px;color:var(--text-bright);" id="stepEditorTitle"></h4>
                <div style="display:flex;gap:8px;">
                  <select id="stepStatus" style="font-size:11px;padding:4px 8px;background:rgba(0,10,30,0.6);border:1px solid rgba(0,229,255,0.15);color:var(--text);border-radius:3px;">
                    <option value="pending">待处理</option><option value="ongoing">进行中</option>
                    <option value="done">已完成</option><option value="problem">有问题</option>
                  </select>
                  <input id="stepDate" type="datetime-local" style="font-size:11px;padding:4px 8px;background:rgba(0,10,30,0.6);border:1px solid rgba(0,229,255,0.15);color:var(--text);border-radius:3px;" />
                </div>
              </div>
              <label style="font-size:10px;color:var(--muted);display:block;margin-bottom:4px;">操作备注</label>
              <textarea id="stepNote" rows="2" style="width:100%;padding:8px;background:rgba(0,10,30,0.5);border:1px solid rgba(0,229,255,0.12);color:var(--text);border-radius:3px;font-family:inherit;font-size:12px;resize:vertical;"></textarea>
              <div style="display:flex;gap:8px;margin-top:8px;">
                <button class="btn primary small" onclick="saveStep()">保存步骤</button>
                <button class="btn small" onclick="document.getElementById('stepEditor').style.display='none'">关闭</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tab: 单证管理 -->
      <div class="tab-content" id="tab-docs">
        <div class="panel">
          <div class="panel-header"><h3>📄 单证清单</h3><span id="docProgress" style="font-size:10px;color:var(--muted);"></span></div>
          <div class="panel-body">
            <div class="doc-grid" id="docGrid"></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header"><h3>📝 添加单证备注</h3></div>
          <div class="panel-body">
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <input id="docNoteText" placeholder="单证备注..." style="flex:1;min-height:34px;padding:6px 10px;background:rgba(0,10,30,0.5);border:1px solid rgba(0,229,255,0.12);color:var(--text);border-radius:3px;font-size:12px;" />
              <button class="btn primary small" onclick="addDocNote()">添加</button>
            </div>
            <div id="docNotesList" style="margin-top:8px;"></div>
          </div>
        </div>
      </div>

      <!-- Tab: 费用明细 -->
      <div class="tab-content" id="tab-cost">
        <div class="panel">
          <div class="panel-header"><h3>💰 费用明细</h3><button class="btn small" onclick="addCostRow()">+ 添加费用项</button></div>
          <div class="panel-body">
            <table class="cost-table">
              <thead><tr><th>费用项目</th><th>币种</th><th>单价</th><th>数量</th><th>金额</th><th></th></tr></thead>
              <tbody id="costBody"></tbody>
              <tfoot id="costFoot"></tfoot>
            </table>
          </div>
        </div>
      </div>

      <!-- Tab: 问题记录 -->
      <div class="tab-content" id="tab-issues">
        <div class="panel">
          <div class="panel-header"><h3>⚠️ 异常与问题</h3></div>
          <div class="panel-body">
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
              <input id="issueText" placeholder="描述问题..." style="flex:1;min-height:34px;padding:6px 10px;background:rgba(0,10,30,0.5);border:1px solid rgba(0,229,255,0.12);color:var(--text);border-radius:3px;font-size:12px;" />
              <select id="issueSeverity" style="font-size:11px;padding:4px 8px;background:rgba(0,10,30,0.6);border:1px solid rgba(0,229,255,0.15);color:var(--text);border-radius:3px;">
                <option value="minor">一般</option><option value="major">重要</option><option value="critical">紧急</option>
              </select>
              <button class="btn danger small" onclick="addIssue()">添加问题</button>
            </div>
            <div id="issueList"></div>
          </div>
        </div>
      </div>

    </div>
  </section>
</div>

<script>
// ========== Process Steps Definition ==========
const STEPS = [
  { id:'accept',    name:'接单确认',     icon:'📞', desc:'接收客户委托，确认货物信息、船期、运价' },
  { id:'booking',   name:'订舱放号',     icon:'📋', desc:'向船公司订舱，获取SO/Booking Confirmation' },
  { id:'container', name:'放柜提空',     icon:'🫗', desc:'凭SO到堆场提取空箱，核对箱号封号' },
  { id:'trucking',  name:'拖车运输',     icon:'🚛', desc:'安排拖车提空箱送至工厂/仓库' },
  { id:'loading',   name:'工厂装货',     icon:'📦', desc:'工厂装货，记录件数、重量、体积' },
  { id:'customs',   name:'报关申报',     icon:'📝', desc:'准备报关资料、HS编码、发票箱单、申报要素' },
  { id:'inspection',name:'海关查验',     icon:'🔍', desc:'如需查验配合海关完成，记录查验结果' },
  { id:'gatein',    name:'还柜进港',     icon:'🏗', desc:'重箱返回码头/堆场，确认进港状态' },
  { id:'vgm',       name:'VGM申报',      icon:'⚖', desc:'提交VGM（核实的集装箱总重）信息' },
  { id:'bl',        name:'提单确认',     icon:'📜', desc:'核对提单草稿（MBL/HBL）、CNEE/NOTIFY/品名' },
  { id:'departure', name:'装船开船',     icon:'🚢', desc:'确认装船，记录实际开船日期ATD' },
  { id:'transit',   name:'中转跟踪',     icon:'🔄', desc:'如有中转港，跟踪中转状态和预计二程船期' },
  { id:'arrival',   name:'到港通知',     icon:'📍', desc:'发送到货通知(AN)给收货人，记录ATA' },
  { id:'release',   name:'换单提货',     icon:'📬', desc:'换D/O、缴目的港费用、安排提货' },
  { id:'delivery',  name:'送货还箱',     icon:'🏠', desc:'安排送货到收货人地址，还空箱至指定堆场' }
];

const DOCS = [
  { id:'so',       name:'订舱确认 SO',             step:'booking' },
  { id:'packing',  name:'装箱单 Packing List',      step:'customs' },
  { id:'invoice',  name:'商业发票 Commercial Inv',   step:'customs' },
  { id:'contract', name:'外贸合同 Sales Contract',   step:'customs' },
  { id:'decl_form',name:'报关单 Customs Declaration',step:'customs' },
  { id:'vgm_doc',  name:'VGM申报回执',              step:'vgm' },
  { id:'bl_draft', name:'提单草稿 BL Draft',         step:'bl' },
  { id:'bl_orig',  name:'正本提单 Original BL',      step:'departure' },
  { id:'sea_waybill',name:'海运单 Sea Waybill',      step:'departure' },
  { id:'an',       name:'到货通知 Arrival Notice',   step:'arrival' },
  { id:'do',       name:'提货单 Delivery Order',     step:'release' },
  { id:'coo',      name:'原产地证 COO',              step:'customs' }
];

// ========== State ==========
const STORAGE_KEY = 'shippingOps.shipments.v1';
let shipments = [];
let selectedId = null;
let activeStepId = null;

// ========== Helpers ==========
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const now = () => new Date().toISOString();
const esc = s => { const m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(s||'').replace(/[&<>"']/g, c => m[c]); };
const fmt = v => v ? new Date(v).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}) : '';

function selected() { return shipments.find(s => s.id === selectedId) || null; }

function initOrder(s) {
  s.status = s.status || '进行中';
  s.steps = s.steps || {};
  STEPS.forEach(st => { s.steps[st.id] = s.steps[st.id] || { status:'pending', date:'', note:'' }; });
  s.docs = s.docs || {};
  DOCS.forEach(d => { s.docs[d.id] = s.docs[d.id] || { checked:false, note:'' }; });
  s.costs = Array.isArray(s.costs) ? s.costs : [];
  s.issues = Array.isArray(s.issues) ? s.issues : [];
  s.docNotes = Array.isArray(s.docNotes) ? s.docNotes : [];
  return s;
}

// ========== Load / Save ==========
function load() {
  try { shipments = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { shipments = []; }
  shipments.forEach(initOrder);
  selectedId = shipments[0]?.id || null;
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(shipments)); }

// ========== Ship List ==========
function renderShipList() {
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const list = document.getElementById('shipList');
  const filtered = shipments.filter(s => {
    if (!q) return true;
    const txt = [s.ref, s.vessel, s.carrier, s.shipper, s.consignee, s.cargo].join(' ').toLowerCase();
    return txt.includes(q);
  }).sort((a,b) => new Date(b.updatedAt||0) - new Date(a.updatedAt||0));

  document.getElementById('shipmentCount').textContent = filtered.length;

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state" style="padding:24px 10px;"><div class="icon">🚢</div><p style="font-size:12px;">无匹配委托</p></div>';
    return;
  }

  // Step progress helper
  const doneCnt = s => Object.values(s.steps||{}).filter(v => v.status==='done').length;

  list.innerHTML = filtered.map(s => {
    const cnt = doneCnt(s);
    const cls = cnt >= 13 ? 'done' : cnt >= 10 ? 'active' : 'active';
    return `
    <div class="ship-card ${s.id===selectedId?'active':''}" onclick="selectShipment('${s.id}')">
      <div class="top">
        <div>
          <span class="bl">${esc(s.ref||'未填')}</span>
          <strong>${esc(s.vessel||'未填船名')} ${esc(s.pol||'')}→${esc(s.pod||'')}</strong>
        </div>
        <span class="stage-badge ${cls}">${cnt}/${STEPS.length}步</span>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px;display:flex;gap:10px;">
        <span>${esc(s.carrier||'')}</span><span>${esc(s.cargo||'未填品名')}</span>
      </div>
    </div>`;
  }).join('');
}

function selectShipment(id) { selectedId = id; activeStepId = null; document.getElementById('stepEditor').style.display='none'; renderAll(); }
function newShipment() {
  const s = initOrder({ id:uid(), ref:`S/O-${new Date().getFullYear()}-${String(shipments.length+1).padStart(3,'0')}`, updatedAt:now(), createdAt:now() });
  shipments.unshift(s); selectedId = s.id; save(); renderAll();
}
function deleteShipment() {
  const s = selected(); if (!s) return;
  if (!confirm(`确定删除委托 ${s.ref||'未填'}？`)) return;
  shipments = shipments.filter(x => x.id !== s.id);
  selectedId = shipments[0]?.id || null; save(); renderAll();
}
function clearAll() {
  if (!confirm('确定清空全部委托？此操作不可恢复。')) return;
  shipments = []; selectedId = null; save(); renderAll();
}

// ========== Save form ==========
function saveShipment() {
  const s = selected(); if (!s) return;
  s.ref = document.getElementById('fRef').value.trim();
  s.status = document.getElementById('fStatus').value;
  s.carrier = document.getElementById('fCarrier').value.trim();
  s.vessel = document.getElementById('fVessel').value.trim();
  s.pol = document.getElementById('fPol').value.trim();
  s.pod = document.getElementById('fPod').value.trim();
  s.etd = document.getElementById('fEtd').value;
  s.eta = document.getElementById('fEta').value;
  s.shipper = document.getElementById('fShipper').value.trim();
  s.consignee = document.getElementById('fConsignee').value.trim();
  s.notify = document.getElementById('fNotify').value.trim();
  s.forwarder = document.getElementById('fForwarder').value.trim();
  s.cargo = document.getElementById('fCargo').value.trim();
  s.hsCode = document.getElementById('fHsCode').value.trim();
  s.packages = document.getElementById('fPackages').value.trim();
  s.grossWeight = document.getElementById('fGrossWeight').value;
  s.cbm = document.getElementById('fCbm').value;
  s.cntrNo = document.getElementById('fCntrNo').value.trim();
  s.cntrType = document.getElementById('fCntrType').value;
  s.sealNo = document.getElementById('fSealNo').value.trim();
  s.tare = document.getElementById('fTare').value;
  s.vgm = document.getElementById('fVgm').value;
  s.updatedAt = now();
  save(); renderAll();
  document.getElementById('saveHint').textContent = '已保存 ' + new Date().toLocaleString('zh-CN',{hour12:false});
  setTimeout(() => document.getElementById('saveHint').textContent = '', 2000);
}

// ========== Process Chain ==========
function renderProcessChain() {
  const s = selected(); if (!s) return;
  const steps = s.steps || {};
  const doneCnt = Object.values(steps).filter(v => v.status==='done').length;
  document.getElementById('stepProgress').textContent = `进度 ${doneCnt}/${STEPS.length}`;

  document.getElementById('processChain').innerHTML = STEPS.map((st, i) => {
    const step = steps[st.id] || { status:'pending', date:'', note:'' };
    const cls = (step.status==='done'?'done':'') + (step.status==='problem'?'issue':'') + (activeStepId===st.id?' current':'');
    const sLabel = { pending:'待处理', ongoing:'进行中', done:'已完成', problem:'有问题' }[step.status] || '待处理';
    const sCls = { pending:'pending', ongoing:'ongoing', done:'done', problem:'problem' }[step.status] || 'pending';
    return `
      <div class="process-node ${cls}" onclick="editStep('${st.id}')">
        <span class="node-num">${i+1}</span>
        <span class="node-name">${st.icon} ${st.name}</span>
        <span class="node-status ${sCls}">${sLabel}</span>
        <span class="node-date">${step.date ? fmt(step.date) : ''}</span>
      </div>
    `;
  }).join('');
}

function editStep(stepId) {
  const s = selected(); if (!s) return;
  activeStepId = stepId;
  const step = s.steps[stepId] || { status:'pending', date:'', note:'' };
  const stDef = STEPS.find(x => x.id === stepId);
  document.getElementById('stepEditorTitle').textContent = `${stDef?.icon||''} ${stDef?.name||stepId} — ${stDef?.desc||''}`;
  document.getElementById('stepStatus').value = step.status;
  document.getElementById('stepDate').value = step.date ? step.date.slice(0,16) : '';
  document.getElementById('stepNote').value = step.note || '';
  document.getElementById('stepEditor').style.display = 'block';
  renderProcessChain();
}

function saveStep() {
  const s = selected(); if (!s || !activeStepId) return;
  s.steps[activeStepId] = {
    status: document.getElementById('stepStatus').value,
    date: document.getElementById('stepDate').value,
    note: document.getElementById('stepNote').value
  };
  s.updatedAt = now();
  save();
  document.getElementById('stepEditor').style.display = 'none';
  activeStepId = null;
  renderProcessChain();
  renderShipList();
}

// ========== Documents ==========
function renderDocs() {
  const s = selected(); if (!s) return;
  const docs = s.docs || {};
  const checkedCnt = Object.values(docs).filter(v => v.checked).length;
  document.getElementById('docProgress').textContent = `${checkedCnt}/${DOCS.length} 已确认`;

  document.getElementById('docGrid').innerHTML = DOCS.map(d => {
    const doc = docs[d.id] || { checked:false, note:'' };
    const stepName = STEPS.find(x => x.id === d.step)?.name || d.step;
    return `
      <div class="doc-item">
        <input type="checkbox" class="doc-check" ${doc.checked?'checked':''} onchange="toggleDoc('${d.id}')" />
        <span class="doc-name">${doc.checked?'<s>':''}${esc(d.name)}${doc.checked?'</s>':''}</span>
        <span class="doc-status ${doc.checked?'ok':'wait'}">${doc.checked?'已确认':'待确认'}</span>
        <span style="font-size:9px;color:var(--muted);">→ ${esc(stepName)}</span>
      </div>
    `;
  }).join('');

  // Doc notes
  document.getElementById('docNotesList').innerHTML = (s.docNotes||[]).slice().reverse().map((n,i) =>
    `<div style="font-size:11px;color:var(--muted);padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);">${esc(n)} <small>${fmt(n._time)}</small></div>`
  ).join('');
}

function toggleDoc(docId) {
  const s = selected(); if (!s) return;
  s.docs[docId].checked = !s.docs[docId].checked;
  s.updatedAt = now(); save(); renderDocs();
}

function addDocNote() {
  const s = selected(); if (!s) return;
  const txt = document.getElementById('docNoteText').value.trim();
  if (!txt) return;
  s.docNotes.push({ text:txt, _time:now() });
  s.updatedAt = now(); save();
  document.getElementById('docNoteText').value = '';
  renderDocs();
}

// ========== Costs ==========
function renderCosts() {
  const s = selected(); if (!s) return;
  const costs = s.costs || [];
  document.getElementById('costBody').innerHTML = costs.map((c,i) => `
    <tr>
      <td><input value="${esc(c.item||'')}" onchange="updateCost(${i},'item',this.value)" style="width:100%;background:transparent;border:none;color:var(--text);font-size:11px;" /></td>
      <td><select onchange="updateCost(${i},'ccy',this.value)" style="background:transparent;border:none;color:var(--text);font-size:11px;">
        <option value="USD" ${c.ccy==='USD'?'selected':''}>USD</option><option value="CNY" ${c.ccy==='CNY'?'selected':''}>CNY</option><option value="EUR" ${c.ccy==='EUR'?'selected':''}>EUR</option>
      </select></td>
      <td class="num"><input value="${c.unitPrice||''}" onchange="updateCost(${i},'unitPrice',this.value)" type="number" step="0.01" style="width:80px;background:transparent;border:none;color:var(--text);font-size:11px;text-align:right;" /></td>
      <td class="num"><input value="${c.qty||1}" onchange="updateCost(${i},'qty',this.value)" type="number" step="0.01" style="width:60px;background:transparent;border:none;color:var(--text);font-size:11px;text-align:right;" /></td>
      <td class="num" style="font-weight:600;">${((parseFloat(c.unitPrice)||0)*(parseFloat(c.qty)||1)).toFixed(2)}</td>
      <td><button class="btn danger small" onclick="removeCost(${i})" style="font-size:10px;">×</button></td>
    </tr>
  `).join('');

  const totals = {};
  costs.forEach(c => { const a = (parseFloat(c.unitPrice)||0)*(parseFloat(c.qty)||1); totals[c.ccy] = (totals[c.ccy]||0) + a; });
  document.getElementById('costFoot').innerHTML = Object.entries(totals).map(([ccy,amt]) =>
    `<tr><td colspan="4" style="text-align:right;">合计 (${ccy})</td><td class="num" style="color:var(--accent);font-size:14px;">${amt.toFixed(2)}</td><td></td></tr>`
  ).join('');
}

function addCostRow() {
  const s = selected(); if (!s) return;
  s.costs.push({ item:'', ccy:'USD', unitPrice:'', qty:'1' });
  s.updatedAt = now(); save(); renderCosts();
}
function updateCost(i, key, val) { const s = selected(); if (!s) return; s.costs[i][key] = val; s.updatedAt = now(); save(); renderCosts(); }
function removeCost(i) { const s = selected(); if (!s) return; s.costs.splice(i,1); s.updatedAt = now(); save(); renderCosts(); }

// ========== Issues ==========
function renderIssues() {
  const s = selected(); if (!s) return;
  document.getElementById('issueList').innerHTML = (s.issues||[]).slice().reverse().map((iss,i) => `
    <div class="issue-card">
      <span class="sev ${iss.severity||'minor'}">${({minor:'一般',major:'重要',critical:'紧急'})[iss.severity]||'一般'}</span>
      <div class="body"><p>${esc(iss.text)}</p><small>${fmt(iss._time)}</small></div>
      <button class="btn danger small" onclick="removeIssue(${i})" style="font-size:9px;">×</button>
    </div>
  `).join('') || '<div class="empty-state" style="padding:20px;"><p style="font-size:12px;">暂无问题记录</p></div>';
}

function addIssue() {
  const s = selected(); if (!s) return;
  const txt = document.getElementById('issueText').value.trim();
  if (!txt) return;
  s.issues.push({ text:txt, severity:document.getElementById('issueSeverity').value, _time:now() });
  s.updatedAt = now(); save();
  document.getElementById('issueText').value = '';
  renderIssues();
}
function removeIssue(i) { const s = selected(); if (!s) return; s.issues.splice(i,1); s.updatedAt = now(); save(); renderIssues(); }

// ========== Render All ==========
function renderAll() {
  const s = selected();
  document.getElementById('emptyState').style.display = s ? 'none' : 'block';
  document.getElementById('editorArea').style.display = s ? 'block' : 'none';
  if (!s) { renderShipList(); return; }

  // Detail tab
  document.getElementById('fRef').value = s.ref || '';
  document.getElementById('fStatus').value = s.status || '进行中';
  document.getElementById('fCarrier').value = s.carrier || '';
  document.getElementById('fVessel').value = s.vessel || '';
  document.getElementById('fPol').value = s.pol || '';
  document.getElementById('fPod').value = s.pod || '';
  document.getElementById('fEtd').value = s.etd || '';
  document.getElementById('fEta').value = s.eta || '';
  document.getElementById('fShipper').value = s.shipper || '';
  document.getElementById('fConsignee').value = s.consignee || '';
  document.getElementById('fNotify').value = s.notify || '';
  document.getElementById('fForwarder').value = s.forwarder || '';
  document.getElementById('fCargo').value = s.cargo || '';
  document.getElementById('fHsCode').value = s.hsCode || '';
  document.getElementById('fPackages').value = s.packages || '';
  document.getElementById('fGrossWeight').value = s.grossWeight || '';
  document.getElementById('fCbm').value = s.cbm || '';
  document.getElementById('fCntrNo').value = s.cntrNo || '';
  document.getElementById('fCntrType').value = s.cntrType || '40HQ';
  document.getElementById('fSealNo').value = s.sealNo || '';
  document.getElementById('fTare').value = s.tare || '';
  document.getElementById('fVgm').value = s.vgm || '';

  renderProcessChain();
  renderDocs();
  renderCosts();
  renderIssues();
  renderShipList();
}

// ========== Tabs ==========
document.getElementById('mainTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab'); if (!tab) return;
  document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.querySelectorAll('#editorArea .tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
});

// ========== Export / Import ==========
function exportData() {
  const blob = new Blob([JSON.stringify(shipments,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `海运操作数据-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href);
}
function importData(e) {
  const f = e.target.files?.[0]; if (!f) return;
  const r = new FileReader(); r.onload = () => {
    try {
      const data = JSON.parse(r.result);
      if (!Array.isArray(data)) throw new Error('格式错误');
      shipments = data; shipments.forEach(initOrder);
      selectedId = shipments[0]?.id || null; save(); renderAll();
    } catch(ex) { alert('导入失败：' + ex.message); }
  };
  r.readAsText(f); e.target.value = '';
}

// ========== Demo ==========
function loadDemo() {
  const demo = {
    id:uid(), ref:'BL-SZX-2026-0042', status:'进行中', carrier:'MAERSK', vessel:'MAERSK MCKINNEY / 2518E',
    pol:'SHENZHEN (YANTIAN)', pod:'HAMBURG', etd:'2026-05-22', eta:'2026-06-28',
    shipper:'Shenzhen Tech Trading Co., Ltd.\n深圳市科技贸易有限公司', consignee:'Hamburg Import GmbH\nRödingsmarkt 14, 20459 Hamburg', notify:'Same as Consignee', forwarder:'DHL Global Forwarding',
    cargo:'LED Lighting Fixtures / LED照明灯具', hsCode:'9405409000', packages:'680 CTNS / 34 PLTS', grossWeight:'12480', cbm:'42.5',
