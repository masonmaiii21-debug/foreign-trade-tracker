<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>报关操作管理</title>
<link rel="stylesheet" href="./styles.css" />
<style>
:root {
  --cs-primary: #c0392b;
  --cs-primary-dark: #922b21;
}
.brand-mark { background: var(--cs-primary) !important; }
.sidebar { background: #2b0d0a !important; }
.sidebar .order-item.active, .sidebar .order-item:hover { background: rgba(192,57,43,0.45) !important; }
.sidebar .brand p, .sidebar .order-item small, .sidebar .order-meta { color: #e0b0a8 !important; }
.sidebar .metric span { color: #e0b0a8 !important; }
.primary { border-color: var(--cs-primary) !important; background: var(--cs-primary) !important; }
.primary:hover { background: var(--cs-primary-dark) !important; }
input:focus, select:focus, textarea:focus { border-color: var(--cs-primary) !important; box-shadow: 0 0 0 3px rgba(192,57,43,0.12) !important; }
.chain-node.done .node-dot, .chain-node.current .node-dot, .chain-node.checked .node-dot { background: var(--cs-primary) !important; }
.chain-node.current { border-color: var(--cs-primary) !important; box-shadow: 0 0 0 3px rgba(192,57,43,0.15) !important; }
.chain-node.done { border-color: rgba(192,57,43,0.42) !important; background: #fef5f3 !important; }
.eyebrow { color: var(--cs-primary) !important; }
#saveHint { color: var(--cs-primary) !important; }
.node-badge { color: var(--cs-primary-dark) !important; }
.follow-grid strong { color: var(--cs-primary-dark) !important; }
.milestone-bar { display: flex; gap: 0; margin-bottom: 12px; border-radius: 8px; overflow: hidden; height: 8px; background: var(--surface-soft); }
.milestone-done { background: var(--cs-primary); height: 100%; transition: width 0.3s; }
.milestone-problem { background: var(--danger); height: 100%; transition: width 0.3s; }
.table-mini { width: 100%; border-collapse: collapse; font-size: 12px; }
.table-mini th { background: var(--surface-soft); padding: 6px 8px; text-align: left; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--line); }
.table-mini td { padding: 6px 8px; border-bottom: 1px solid var(--line); }
.table-mini .num { text-align: right; font-variant-numeric: tabular-nums; }
.table-mini tfoot td { font-weight: 700; color: var(--accent); border-top: 2px solid var(--line); }
.table-mini input { min-height: 26px; font-size: 11px; padding: 3px 5px; background: transparent; border: none; color: var(--text); width: 100%; }
.table-mini input:focus { outline: none; }
.doc-check-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.doc-check-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; background: #fbfdfc; }
.doc-check-item input[type=checkbox] { width: 18px; height: 18px; min-height: 0; accent-color: var(--cs-primary); cursor: pointer; }
.doc-check-item .doc-label { font-size: 12px; flex: 1; }
.doc-check-item .doc-badge { font-size: 9px; padding: 2px 6px; border-radius: 99px; white-space: nowrap; }
.doc-check-item .doc-badge.ok { background: #fef0ed; color: var(--cs-primary); }
.doc-check-item .doc-badge.wait { background: #fff2d8; color: var(--warning); }
/* Free-flow layout override */
.content-grid { grid-template-columns: 1fr !important; gap: 12px !important; }
.order-form { grid-column: auto !important; grid-row: auto !important; }
.flow-panel { grid-column: auto !important; }
.reminder-panel { grid-column: auto !important; grid-template-columns: 1fr !important; }
.reminder-panel > .follow-summary { grid-column: auto !important; grid-row: auto !important; border-top: 1px solid var(--line); margin-top: 12px; padding-top: 12px; }
.issue-panel, .contact-panel, .activity-panel { grid-column: auto !important; }
.panel { margin-bottom: 10px; }
.form-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 10px; }
.doc-check-grid { grid-template-columns: repeat(3, 1fr); }
@media (max-width:1100px) { .form-grid { grid-template-columns: repeat(2, 1fr) !important; } .doc-check-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width:600px) { .form-grid { grid-template-columns: 1fr !important; } .doc-check-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<main class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">关</div>
      <div><h1>报关操作</h1><p>申报 → 审单 → 查验 → 放行</p></div>
    </div>
    <div class="metrics" id="metrics"></div>
    <div class="toolbar">
      <button class="primary" id="newBtn" type="button">+ 新建报关单</button>
      <button class="ghost" id="exportBtn" type="button" title="导出数据">⇩</button>
      <label class="ghost file-action" title="导入数据">⇧<input id="importInput" type="file" accept="application/json" /></label>
    </div>
    <div class="filters">
      <input id="searchInput" type="search" placeholder="搜索报关单号、客户、HS编码" />
      <select id="statusFilter"><option value="">全部状态</option></select>
    </div>
    <div class="order-list" id="customsList"></div>
  </aside>

  <section class="workspace">
    <header class="topbar">
      <div><p class="eyebrow">工作台</p><h2 id="pageTitle">选择或新建报关单</h2></div>
      <button class="danger ghost hidden" id="deleteBtn" type="button">删除报关单</button>
    </header>

    <section class="panel empty-state" id="emptyState">
      <div><h2>开始申报第一票</h2><p>跟踪出口报关全流程：资料准备、HS归类、电子申报、海关审单、查验配合、缴税放行、退税申报。</p><button class="primary" id="emptyNewBtn" type="button">新建报关单</button></div>
    </section>

    <section class="content-grid hidden" id="editorArea">
      <!-- Process Chain -->
      <section class="panel flow-panel">
        <div class="section-title"><h3>报关操作流程</h3><span id="stepProgress"></span></div>
        <div class="milestone-bar"><div class="milestone-done" id="milestoneDone" style="width:0%"></div><div class="milestone-problem" id="milestoneProblem" style="width:0%"></div></div>
        <div class="progress-chain" id="progressChain"></div>
        <div class="node-editor" id="nodeEditor">
          <div><strong id="nodeNoteTitle">步骤备注</strong><p id="nodeNoteMeta"></p></div>
          <label>操作备注<textarea id="nodeNoteText" rows="3" placeholder="记录该步骤具体情况、海关反馈、异常处理等"></textarea></label>
          <div class="alarm-picker">
            <label>月<select id="nodeReminderMonth"></select></label><label>日<select id="nodeReminderDay"></select></label>
            <label>时<select id="nodeReminderHour"></select></label><label>分<select id="nodeReminderMinute"></select></label>
          </div>
          <div class="node-actions"><button class="secondary" id="clearNodeReminderBtn" type="button">清除提醒</button><button class="primary" id="saveNodeNoteBtn" type="button">保存步骤</button></div>
        </div>
      </section>

      <!-- Reminders + Summary -->
      <section class="panel reminder-panel">
        <div class="section-title"><h3>提醒</h3><span id="reminderCount"></span></div>
        <div class="reminder-list" id="reminderList"></div>
        <div class="follow-summary" id="followSummary"></div>
      </section>

      <!-- Customs Form -->
      <form class="panel order-form" id="customsForm">
        <div class="section-title"><h3>报关基本信息</h3><span id="lastUpdated"></span></div>
        <div class="form-grid">
          <label>报关单号<input id="fRef" required autocomplete="off" placeholder="海关报关单号 / 预录入号" /></label>
          <label>状态<select id="fStatus"></select></label>
          <label>关联订单号<input id="fOrderNo" autocomplete="off" placeholder="对应的外贸订单号" /></label>
          <label>客户<input id="fCustomer" autocomplete="off" placeholder="客户/公司名称" /></label>
          <label>出口口岸<select id="fPort"><option value="">选择口岸</option><option value="深圳海关">深圳海关</option><option value="上海海关">上海海关</option><option value="宁波海关">宁波海关</option><option value="广州海关">广州海关</option><option value="天津海关">天津海关</option><option value="青岛海关">青岛海关</option><option value="厦门海关">厦门海关</option><option value="大连海关">大连海关</option><option value="南京海关">南京海关</option><option value="黄埔海关">黄埔海关</option><option value="重庆海关">重庆海关</option><option value="其他">其他口岸</option></select></label>
          <label>运输方式<select id="fTransport"><option value="水路运输">水路运输</option><option value="航空运输">航空运输</option><option value="铁路运输">铁路运输</option><option value="公路运输">公路运输</option></select></label>
          <label>贸易方式<select id="fTradeMode"><option value="一般贸易">一般贸易 (0110)</option><option value="进料加工">进料加工 (0615)</option><option value="来料加工">来料加工 (0214)</option><option value="保税监管">保税监管 (1200)</option><option value="退运货物">退运货物</option><option value="其他">其他</option></select></label>
          <label>征免性质<select id="fExemption"><option value="一般征税">一般征税</option><option value="来料加工">来料加工</option><option value="进料加工">进料加工</option><option value="中外合资">中外合资</option><option value="外资企业">外资企业</option></select></label>
          <label>成交方式<select id="fDealMode"><option value="FOB">FOB</option><option value="CIF">CIF</option><option value="C&F">C&F (CNF)</option><option value="EXW">EXW</option></select></label>
          <label>结汇方式<select id="fSettlement"><option value="电汇">电汇 T/T</option><option value="信用证">信用证 L/C</option><option value="托收">托收 D/P D/A</option><option value="其他">其他</option></select></label>
          <label>报关行<input id="fBroker" autocomplete="off" placeholder="报关行/报关员名称" /></label>
          <label>申报日期<input id="fDeclDate" type="date" /></label>
          <label>预计放行日<input id="fReleaseDate" type="date" /></label>
          <label style="grid-column:span 2;">备注<textarea id="fNotes" rows="2" placeholder="特殊报关要求、海关注意事项等"></textarea></label>
        </div>
        <div class="form-actions"><button class="primary" type="submit">保存修改</button><span id="saveHint"></span></div>
      </form>

      <!-- Goods & HS Info -->
      <section class="panel" style="padding:20px;">
        <div class="section-title"><h3>商品申报信息</h3><span>申报要素、HS编码、税款明细</span></div>
        <div class="form-grid">
          <label>品名 (中文)<input id="fCargoCN" autocomplete="off" placeholder="中文品名" /></label>
          <label>品名 (英文)<input id="fCargoEN" autocomplete="off" placeholder="英文品名" /></label>
          <label>HS编码<input id="fHsCode" autocomplete="off" placeholder="例如 9403609990" /></label>
          <label>法定单位<select id="fUnit"><option value="个">个</option><option value="千克">千克</option><option value="套">套</option><option value="台">台</option><option value="件">件</option><option value="米">米</option><option value="平方米">平方米</option></select></label>
          <label>申报数量<input id="fDeclQty" type="number" step="0.01" placeholder="按法定单位的数量" /></label>
          <label>申报单价<input id="fDeclPrice" type="number" step="0.01" placeholder="按法定单位的单价" /></label>
          <label>申报总价 (USD)<input id="fDeclTotal" type="number" step="0.01" placeholder="申报总金额" /></label>
          <label>币制<select id="fCurrency"><option value="USD">USD 美元</option><option value="EUR">EUR 欧元</option><option value="JPY">JPY 日元</option><option value="CNY">CNY 人民币</option></select></label>
          <label>毛重 (KGS)<input id="fGrossWt" type="number" step="0.1" placeholder="货物毛重" /></label>
          <label>净重 (KGS)<input id="fNetWt" type="number" step="0.1" placeholder="货物净重" /></label>
          <label>件数<input id="fPackages" type="number" placeholder="包装件数" /></label>
          <label>包装种类<select id="fPackType"><option value="纸箱">纸箱 CTNS</option><option value="托盘">托盘 PLTS</option><option value="木箱">木箱</option><option value="桶装">桶装</option><option value="散装">散装</option></select></label>
          <label>原产国<select id="fOrigin"><option value="中国">中国 CN</option><option value="越南">越南 VN</option><option value="印度">印度 IN</option><option value="其他">其他</option></select></label>
          <label>最终目的国<select id="fDest"><option value="美国">美国 US</option><option value="德国">德国 DE</option><option value="日本">日本 JP</option><option value="英国">英国 GB</option><option value="韩国">韩国 KR</option><option value="其他">其他</option></select></label>
          <label>出口退税率 (%)<input id="fTaxRate" type="number" step="0.1" placeholder="例如 13" /></label>
          <label>监管条件<input id="fRegCondition" autocomplete="off" placeholder="例如 A/B/M" /></label>
          <label style="grid-column:span 2;">申报要素<textarea id="fDeclElements" rows="3" placeholder="品牌类型|用途|材质|功能|原理|规格型号|其他"></textarea></label>
        </div>
        <div class="form-actions"><button class="primary" id="saveGoodsBtn" type="button">保存商品信息</button><span id="goodsSaveHint" style="color:var(--cs-primary);font-size:13px;"></span></div>
      </section>

      <!-- Tax & Fee -->
      <section class="panel" style="padding:20px;">
        <div class="section-title"><h3>税费明细</h3><button class="secondary small" id="addTaxBtn" type="button">+ 添加</button></div>
        <table class="table-mini"><thead><tr><th>税费项目</th><th>税率%</th><th>计税金额</th><th>实缴金额(CNY)</th><th>缴纳日期</th><th></th></tr></thead><tbody id="taxBody"></tbody><tfoot id="taxFoot"></tfoot></table>
      </section>

      <!-- Required Docs Checklist -->
      <section class="panel" style="padding:20px;">
        <div class="section-title"><h3>报关所需单证核对</h3><span id="docCheckProgress"></span></div>
        <div class="doc-check-grid" id="docCheckGrid"></div>
      </section>

      <!-- Issues -->
      <section class="panel issue-panel">
        <div class="section-title"><h3>问题记录</h3><span id="issueCount"></span></div>
        <form class="issue-form" id="issueForm"><textarea id="issueText" rows="3" placeholder="记录海关退单、查验问题、申报错误、HS归类争议等"></textarea><div class="issue-controls"><select id="issueSeverity"><option value="一般">一般</option><option value="重要">重要</option><option value="紧急">紧急</option></select><button class="secondary" type="submit">添加问题</button></div></form>
        <div class="issue-list" id="issueList"></div>
      </section>

      <!-- Contacts -->
      <section class="panel contact-panel">
        <div class="section-title"><h3>联系方式</h3><span id="contactCount"></span></div>
        <form class="contact-form" id="contactForm"><div class="contact-grid">
          <label>类型<select id="contactRole"><option value="报关行">报关行</option><option value="报关员">报关员</option><option value="海关">海关联系人</option><option value="货代">货代</option><option value="客户">客户</option><option value="财务">财务/退税专员</option><option value="其他">其他</option></select></label>
          <label>姓名/备注<input id="contactNote" autocomplete="off" placeholder="联系人姓名和备注" /></label>
          <label>电话<input id="contactPhone" autocomplete="off" inputmode="tel" placeholder="例如 13800000000" /></label>
          <label>邮箱<input id="contactEmail" autocomplete="off" inputmode="email" placeholder="name@example.com" /></label>
        </div><button class="secondary" type="submit">添加联系人</button></form>
        <div class="contact-list" id="contactList"></div>
      </section>

      <!-- Activity Log -->
      <section class="panel activity-panel"><div class="section-title"><h3>更新记录</h3><span id="activityCount"></span></div><div class="activity-list" id="activityList"></div></section>
    </section>
  </section>
</main>

<template id="itemTemplate">
  <button class="order-item" type="button"><span class="order-main"><strong></strong><small></small><span style="font-size:10px;margin-top:2px;display:flex;gap:8px;"></span></span><span class="order-meta"></span></button>
</template>
<template id="issueTemplate">
  <article class="issue-item"><div><span class="severity"></span><p></p><small></small></div><div class="issue-actions"><button class="ghost close-issue" type="button" title="解决/重开">✓</button><button class="ghost delete-issue" type="button" title="删除问题">×</button></div></article>
</template>

<script>
const STEPS = [
  { id:'01', name:'确认报关资料', desc:'收集核对全套报关单证：发票、箱单、合同、申报要素、报关委托书' },
  { id:'02', name:'HS编码归类', desc:'确定商品HS编码，核查监管条件、退税率、申报要素要求' },
  { id:'03', name:'申报要素填写', desc:'按海关要求填写：品牌类型、用途、材质、功能、原理、规格型号等' },
  { id:'04', name:'电子申报录入', desc:'在报关系统/单一窗口中录入全部申报数据，核对无误' },
  { id:'05', name:'单一窗口提交', desc:'通过中国国际贸易单一窗口正式提交报关数据' },
  { id:'06', name:'海关审单受理', desc:'海关电子审单或人工审单，等待审单结果' },
  { id:'07', name:'审单结果反馈', desc:'接收审单回执：放行/退单/转人工/需补充材料' },
  { id:'08', name:'查验通知接收', desc:'如被布控查验，接收海关查验通知，确认查验方式和时间' },
  { id:'09', name:'预约配合查验', desc:'联系查验科室预约时间，准备货物和单证' },
  { id:'10', name:'现场配合查验', desc:'安排人员到场配合海关开箱/机检/人工查验' },
  { id:'11', name:'查验结果处理', desc:'记录查验结果：放行/取样送检/扣留/需整改，如异常及时处理' },
  { id:'12', name:'缴纳税费', desc:'完成关税、增值税、消费税等税费的电子支付' },
  { id:'13', name:'海关放行', desc:'获取海关放行指令，确认货物可装运/提离' },
  { id:'14', name:'结关完成', desc:'海关系统结关，获取结关单据，可下载报关单证明联' },
  { id:'15', name:'退税申报/归档', desc:'准备出口退税申报资料提交税务局，全套报关资料归档备查' }
];

const DOC_LIST = [
  { id:'d01', name:'商业发票 Commercial Invoice' },
  { id:'d02', name:'装箱单 Packing List' },
  { id:'d03', name:'外贸合同 Sales Contract' },
  { id:'d04', name:'报关委托书 Customs POA' },
  { id:'d05', name:'申报要素表 Declaration Elements' },
  { id:'d06', name:'HS编码归类确认单' },
  { id:'d07', name:'原产地证 COO/FORM' },
  { id:'d08', name:'检验检疫证书（如需）' },
  { id:'d09', name:'许可证/监管证件（如需）' },
  { id:'d10', name:'预录入核对单' },
  { id:'d11', name:'海关查验记录单' },
  { id:'d12', name:'税款缴纳凭证' },
  { id:'d13', name:'放行通知书' },
  { id:'d14', name:'出口报关单证明联' }
];

const STATUSES = ['进行中','申报中','审单中','查验中','已放行','已结关','已退税','有异常'];
const STORAGE_KEY = 'customsOps.declarations.v1';
const state = { decls: [], selectedId: null, selectedNode: null };
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const now = () => new Date().toISOString();
const nowText = () => new Date().toLocaleString('zh-CN',{hour12:false});
const esc = s => { const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(s||'').replace(/[&<>"']/g,c=>m[c]); };
const fmt = v => v?new Date(v).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}):'';
function formatReminder(v) { if(!v)return'';const d=new Date(v);if(isNaN(d.getTime()))return String(v);return d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}); }
function selected() { return state.decls.find(d=>d.id===state.selectedId)||null; }

function initDecl(d) {
  d.status = STATUSES.includes(d.status)?d.status:'进行中';
  d.steps = d.steps||{}; STEPS.forEach(s=>{d.steps[s.id]=d.steps[s.id]||{status:'pending',date:'',note:''};});
  d.checklist = d.checklist||{}; DOC_LIST.forEach(dc=>{d.checklist[dc.id]=d.checklist[dc.id]||{checked:false};});
  d.issues=Array.isArray(d.issues)?d.issues:[]; d.contacts=Array.isArray(d.contacts)?d.contacts:[];
  d.activities=Array.isArray(d.activities)?d.activities:[]; d.taxes=Array.isArray(d.taxes)?d.taxes:[];
  const fields = ['ref','orderNo','customer','port','transport','tradeMode','exemption','dealMode','settlement','broker','declDate','releaseDate','notes',
    'cargoCN','cargoEN','hsCode','unit','declQty','declPrice','declTotal','currency','grossWt','netWt','packages','packType','origin','dest','taxRate','regCondition','declElements'];
  fields.forEach(f=>{d[f]=d[f]||'';});
  return d;
}

function load(){try{state.decls=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{state.decls=[];}state.decls.forEach(initDecl);state.selectedId=state.decls[0]?.id||null;}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state.decls));}

function populateSelects(){
  document.querySelector('#statusFilter').innerHTML='<option value="">全部状态</option>'+STATUSES.map(s=>`<option value="${s}">${s}</option>`).join('');
  document.querySelector('#fStatus').innerHTML=STATUSES.map(s=>`<option value="${s}">${s}</option>`).join('');
  ['nodeReminderMonth','nodeReminderDay','nodeReminderHour','nodeReminderMinute'].forEach((id,i)=>{
    const el=document.querySelector('#'+id);if(!el)return;
    if(i===0)el.innerHTML='<option value="">月</option>'+Array.from({length:12},(_,x)=>`<option value="${x+1}">${x+1}月</option>`).join('');
    if(i===1)el.innerHTML='<option value="">日</option>'+Array.from({length:31},(_,x)=>`<option value="${x+1}">${x+1}日</option>`).join('');
    if(i===2)el.innerHTML='<option value="">时</option>'+Array.from({length:24},(_,x)=>`<option value="${String(x).padStart(2,'0')}">${String(x).padStart(2,'0')}时</option>`).join('');
    if(i===3)el.innerHTML='<option value="">分</option>'+Array.from({length:60},(_,x)=>`<option value="${String(x).padStart(2,'0')}">${String(x).padStart(2,'0')}分</option>`).join('');
  });
}

function renderList(){
  const q=(document.querySelector('#searchInput')?.value||'').trim().toLowerCase();
  const st=document.querySelector('#statusFilter')?.value||'';
  const list=document.querySelector('#customsList');
  const filtered=state.decls.filter(d=>!st||d.status===st).filter(d=>!q||[d.ref,d.customer,d.hsCode,d.orderNo].join(' ').toLowerCase().includes(q)).sort((a,b)=>new Date(b.updatedAt||0)-new Date(a.updatedAt||0));
  if(!list)return;
  const done=d=>Object.values(d.steps||{}).filter(v=>v.status==='done').length;
  if(!filtered.length){list.innerHTML='<div class="order-item"><span>暂无匹配报关单</span></div>';return;}
  const tpl=document.querySelector('#itemTemplate');list.innerHTML='';
  filtered.forEach(d=>{
    const n=tpl.content.firstElementChild.cloneNode(true);
    n.classList.toggle('active',d.id===state.selectedId);
    n.querySelector('strong').textContent=d.ref||'未填报关单号';
    n.querySelector('small').textContent=`${d.customer||''} · HS:${d.hsCode||'?'}`;
    n.querySelector('.order-main span:last-child').textContent=`${done(d)}/${STEPS.length}步 · ${d.port||'未选口岸'} · ${d.tradeMode||''}`;
    n.querySelector('.order-meta').textContent=d.status||'';
    n.addEventListener('click',()=>{state.selectedId=d.id;state.selectedNode=null;renderAll();});
    list.appendChild(n);
  });
}

function renderMetrics(){
  const el=document.querySelector('#metrics');if(!el)return;
  const active=state.decls.filter(d=>['进行中','申报中','审单中'].includes(d.status)).length;
  const released=state.decls.filter(d=>['已放行','已结关'].includes(d.status)).length;
  const refunded=state.decls.filter(d=>d.status==='已退税').length;
  el.innerHTML=[['处理中',active],['已放行',released],['已退税',refunded]].map(([l,v])=>`<div class="metric"><strong>${v}</strong><span>${l}</span></div>`).join('');
}

function renderProcessChain(){
  const d=selected();if(!d)return;
  const steps=d.steps||{};
  const doneCnt=Object.values(steps).filter(v=>v.status==='done').length;
  const probCnt=Object.values(steps).filter(v=>v.status==='problem').length;
  document.querySelector('#stepProgress').textContent=`${doneCnt}/${STEPS.length} 已完成`;
  document.querySelector('#milestoneDone').style.width=(doneCnt/STEPS.length*100)+'%';
  document.querySelector('#milestoneProblem').style.width=(probCnt/STEPS.length*100)+'%';
  const chain=document.querySelector('#progressChain');if(!chain)return;
  chain.innerHTML=STEPS.map((st,i)=>{
    const step=steps[st.id]||{status:'pending',date:'',note:''};
    let cls='chain-node';
    if(step.status==='done')cls+=' done';
    if(step.status==='problem')cls+=' risk';
    if(state.selectedNode===st.id)cls+=' selected current';
    return`<div class="chain-node-wrap"><button class="${cls}" type="button" data-step="${st.id}"><span class="node-dot">${i+1}</span><span class="node-name">${st.name}</span><span class="node-summary">${step.date?step.date.slice(0,10):(step.status==='done'?'✓':'待处理')}</span>${step.note?`<span class="node-badges"><span class="node-badge note-badge">备注</span></span>`:''}</button></div>`;
  }).join('');
  chain.querySelectorAll('.chain-node').forEach(b=>b.addEventListener('click',()=>{state.selectedNode=b.dataset.step;renderProcessChain();renderNodeEditor();}));
}

function renderNodeEditor(){
  const d=selected();if(!d)return;
  const ed=document.querySelector('#nodeEditor');
  if(!state.selectedNode){ed.style.display='none';return;}
  ed.style.display='grid';
  const step=d.steps[state.selectedNode]||{status:'pending',date:'',note:''};
  const def=STEPS.find(x=>x.id===state.selectedNode);
  document.querySelector('#nodeNoteTitle').textContent=def?.name||'';
  document.querySelector('#nodeNoteMeta').textContent=def?.desc||'';
  document.querySelector('#nodeNoteText').value=step.note||'';
  if(step.date){const dt=new Date(step.date);document.querySelector('#nodeReminderMonth').value=dt.getMonth()+1;document.querySelector('#nodeReminderDay').value=dt.getDate();document.querySelector('#nodeReminderHour').value=String(dt.getHours()).padStart(2,'0');document.querySelector('#nodeReminderMinute').value=String(dt.getMinutes()).padStart(2,'0');}
}

function renderAll(){
  const d=selected();
  document.querySelector('#emptyState').classList.toggle('hidden',!!d);
  document.querySelector('#editorArea').classList.toggle('hidden',!d);
  document.querySelector('#deleteBtn').classList.toggle('hidden',!d);
  document.querySelector('#pageTitle').textContent=d?`${d.ref||'未填'} · ${d.customer||''} HS:${d.hsCode||'?'}`:'选择或新建报关单';
  if(!d){renderList();renderMetrics();return;}
  document.querySelector('#fRef').value=d.ref||'';document.querySelector('#fStatus').value=d.status||'进行中';
  document.querySelector('#fOrderNo').value=d.orderNo||'';document.querySelector('#fCustomer').value=d.customer||'';
  document.querySelector('#fPort').value=d.port||'';document.querySelector('#fTransport').value=d.transport||'水路运输';
  document.querySelector('#fTradeMode').value=d.tradeMode||'一般贸易';document.querySelector('#fExemption').value=d.exemption||'一般征税';
  document.querySelector('#fDealMode').value=d.dealMode||'FOB';document.querySelector('#fSettlement').value=d.settlement||'电汇';
  document.querySelector('#fBroker').value=d.broker||'';document.querySelector('#fDeclDate').value=d.declDate||'';
  document.querySelector('#fReleaseDate').value=d.releaseDate||'';document.querySelector('#fNotes').value=d.notes||'';
  document.querySelector('#lastUpdated').textContent=`更新于 ${fmt(d.updatedAt)}`;
  // Goods info
  document.querySelector('#fCargoCN').value=d.cargoCN||'';document.querySelector('#fCargoEN').value=d.cargoEN||'';
  document.querySelector('#fHsCode').value=d.hsCode||'';document.querySelector('#fUnit').value=d.unit||'个';
  document.querySelector('#fDeclQty').value=d.declQty||'';document.querySelector('#fDeclPrice').value=d.declPrice||'';
  document.querySelector('#fDeclTotal').value=d.declTotal||'';document.querySelector('#fCurrency').value=d.currency||'USD';
  document.querySelector('#fGrossWt').value=d.grossWt||'';document.querySelector('#fNetWt').value=d.netWt||'';
  document.querySelector('#fPackages').value=d.packages||'';document.querySelector('#fPackType').value=d.packType||'纸箱';
  document.querySelector('#fOrigin').value=d.origin||'中国';document.querySelector('#fDest').value=d.dest||'美国';
  document.querySelector('#fTaxRate').value=d.taxRate||'';document.querySelector('#fRegCondition').value=d.regCondition||'';
  document.querySelector('#fDeclElements').value=d.declElements||'';
  renderProcessChain();renderNodeEditor();renderReminders(d);renderTaxes(d);renderDocChecklist(d);renderIssues(d);renderContacts(d);renderActivities(d);renderList();renderMetrics();
}

function renderReminders(d){
  const rems=STEPS.map(s=>({stage:s.name,reminderAt:d.steps[s.id]?.date||'',note:d.steps[s.id]?.note||''})).filter(r=>r.reminderAt);
  document.querySelector('#reminderCount').textContent=rems.length?`${rems.length} 条`:'无';
  const rl=document.querySelector('#reminderList');
  if(!rems.length){rl.innerHTML='<div class="reminder-item">暂无提醒</div>';}else{rems.sort((a,b)=>a.reminderAt.localeCompare(b.reminderAt));rl.innerHTML=rems.map(r=>`<article class="reminder-item"><strong>${esc(r.stage)} · ${formatReminder(r.reminderAt)}</strong><span>${esc(r.note||'需跟进')}</span></article>`).join('');}
  const fs=document.querySelector('#followSummary');if(!fs)return;
  const open=(d.issues||[]).filter(i=>i.status!=='已解决');const p=(d.contacts||[])[0];
  fs.innerHTML=`<div class="follow-grid"><article><strong>当前状态</strong><span>${esc(d.status||'进行中')} · ${d.port||'未选口岸'}</span></article><article><strong>退税率</strong><span>${d.taxRate||'未填'}% · HS:${d.hsCode||'?'}</span></article><article><strong>问题</strong><span>${open.length?open.length+'个未解决':'暂无'}</span></article><article><strong>报关行</strong><span>${esc(d.broker||'未填')} ${p?`📞 ${p.phone||''}`:''}</span></article></div><div class="goods-strip"><span>${esc(d.cargoCN||'未填品名')}</span><span>HS:${esc(d.hsCode||'?')}</span><span>${esc(d.tradeMode||'')}</span><span>${esc(d.port||'?')}</span></div>`;
}

function renderTaxes(d){
  const taxes=d.taxes||[];const tbody=document.querySelector('#taxBody');
  tbody.innerHTML=taxes.map((t,i)=>`<tr>
    <td><input value="${esc(t.item||'')}" onchange="updateTax(${i},'item',this.value)" placeholder="如：关税/增值税/消费税" /></td>
    <td class="num"><input value="${t.rate||''}" onchange="updateTax(${i},'rate',this.value)" type="number" step="0.01" style="text-align:right;" /></td>
    <td class="num"><input value="${t.baseAmt||''}" onchange="updateTax(${i},'baseAmt',this.value)" type="number" step="0.01" style="text-align:right;" /></td>
    <td class="num"><input value="${t.paidAmt||''}" onchange="updateTax(${i},'paidAmt',this.value)" type="number" step="0.01" style="text-align:right;" /></td>
    <td><input value="${t.paidDate||''}" onchange="updateTax(${i},'paidDate',this.value)" type="date" /></td>
    <td><button class="ghost" onclick="removeTax(${i})" style="color:var(--danger);">×</button></td>
  </tr>`).join('');
  const total=taxes.reduce((sum,t)=>sum+(parseFloat(t.paidAmt)||0),0);
  document.querySelector('#taxFoot').innerHTML=taxes.length?`<tr><td colspan="3" style="text-align:right;font-weight:700;">实缴合计</td><td class="num" style="color:var(--accent);font-size:15px;font-weight:700;">${total.toFixed(2)}</td><td colspan="2">CNY</td></tr>`:'';
}
function addTax(){const d=selected();if(!d)return;d.taxes.push({item:'',rate:'',baseAmt:'',paidAmt:'',paidDate:''});d.updatedAt=now();save();renderTaxes(d);}
function updateTax(i,k,v){const d=selected();if(!d)return;d.taxes[i][k]=v;d.updatedAt=now();save();renderTaxes(d);}
function removeTax(i){const d=selected();if(!d)return;d.taxes.splice(i,1);d.updatedAt=now();save();renderAll();}

function renderDocChecklist(d){
  const prog=document.querySelector('#docCheckProgress');
  const checked=Object.values(d.checklist||{}).filter(v=>v.checked).length;
  if(prog)prog.textContent=`${checked}/${DOC_LIST.length} 已确认`;
  const grid=document.querySelector('#docCheckGrid');if(!grid)return;
  grid.innerHTML=DOC_LIST.map(dc=>{
    const c=(d.checklist||{})[dc.id]||{checked:false};
    return`<div class="doc-check-item"><input type="checkbox" ${c.checked?'checked':''} onchange="toggleDocCheck('${dc.id}')" /><span class="doc-label">${c.checked?'<s style="color:var(--muted);">'+esc(dc.name)+'</s>':esc(dc.name)}</span><span class="doc-badge ${c.checked?'ok':'wait'}">${c.checked?'✅ 已备齐':'待准备'}</span></div>`;
  }).join('');
}
function toggleDocCheck(id){const d=selected();if(!d)return;d.checklist[id].checked=!d.checklist[id].checked;d.updatedAt=now();save();renderDocChecklist(d);}

function renderIssues(d){
  const open=(d.issues||[]).filter(i=>i.status!=='已解决').length;
  document.querySelector('#issueCount').textContent=`${open} 个未解决`;
  const il=document.querySelector('#issueList');if(!il)return;
  if(!d.issues?.length){il.innerHTML='<div class="issue-item"><p>暂无问题记录</p></div>';return;}
  const tpl=document.querySelector('#issueTemplate');il.innerHTML='';
  d.issues.slice().sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).forEach(i=>{
    const n=tpl.content.firstElementChild.cloneNode(true);n.classList.toggle('resolved',i.status==='已解决');
    const s=n.querySelector('.severity');s.textContent=`${i.category||'报关'} · ${i.severity} · ${i.status}`;s.classList.add(i.severity);
    n.querySelector('p').textContent=i.text;n.querySelector('small').textContent=`创建 ${fmt(i.createdAt)} · 更新 ${fmt(i.updatedAt)}`;
    n.querySelector('.close-issue').addEventListener('click',()=>toggleIssue(i.id));
    n.querySelector('.delete-issue').addEventListener('click',()=>deleteIssue(i.id));
    il.appendChild(n);
  });
}
function addIssue(e){e.preventDefault();const d=selected();if(!d)return;const tx=document.querySelector('#issueText').value.trim();if(!tx)return;const ca=now();d.issues.push({id:uid(),text:tx,severity:document.querySelector('#issueSeverity').value,category:'报关',status:'未解决',createdAt:ca,updatedAt:ca});d.updatedAt=ca;save();document.querySelector('#issueText').value='';renderAll();}
function toggleIssue(id){const d=selected();const i=d?.issues?.find(x=>x.id===id);if(!i)return;i.status=i.status==='已解决'?'未解决':'已解决';i.updatedAt=now();d.updatedAt=now();save();renderAll();}
function deleteIssue(id){const d=selected();if(!d)return;d.issues=d.issues.filter(x=>x.id!==id);d.updatedAt=now();save();renderAll();}

function renderContacts(d){
  const cs=d.contacts||[];document.querySelector('#contactCount').textContent=cs.length?`${cs.length} 个`:'无';
  const cl=document.querySelector('#contactList');if(!cl)return;
  if(!cs.length){cl.innerHTML='<div class="contact-item"><p>暂无联系方式</p></div>';return;}
  cl.innerHTML=cs.map(c=>`<article class="contact-item"><div><strong>${esc(c.role||'其他')}${c.name?` · ${esc(c.name)}`:''}</strong><p>📞 ${esc(c.phone||'未填')} ✉ ${esc(c.email||'未填')}</p></div><div class="contact-actions"><button class="ghost" onclick="deleteContact('${c.id}')">×</button></div></article>`).join('');
}
function addContact(e){e.preventDefault();const d=selected();if(!d)return;const ph=document.querySelector('#contactPhone').value.trim();const em=document.querySelector('#contactEmail').value.trim();if(!ph&&!em){alert('请至少填写电话或邮箱');return;}const ca=now();d.contacts.push({id:uid(),role:document.querySelector('#contactRole').value,name:document.querySelector('#contactNote').value.trim(),phone:ph,email:em,createdAt:ca,updatedAt:ca});d.updatedAt=ca;save();document.querySelector('#contactNote').value='';document.querySelector('#contactPhone').value='';document.querySelector('#contactEmail').value='';renderAll();}
function deleteContact(id){const d=selected();if(!d)return;d.contacts=d.contacts.filter(x=>x.id!==id);d.updatedAt=now();save();renderAll();}

function renderActivities(d){
  const a=d.activities||[];document.querySelector('#activityCount').textContent=`${a.length} 条`;
  document.querySelector('#activityList').innerHTML=a.length?a.slice().reverse().map(x=>`<article class="activity-item"><p>${esc(x.text)}</p><small>${fmt(x.createdAt)}</small></article>`).join(''):'<div class="activity-item"><p>暂无记录</p></div>';
}

function addDecl(){
  const ca=now();const d=initDecl({id:uid(),ref:`CUS-${new Date().getFullYear()}-${String(state.decls.length+1).padStart(3,'0')}`,createdAt:ca,updatedAt:ca});
  d.activities.push({id:uid(),text:'新建报关单',createdAt:ca});state.decls.unshift(d);state.selectedId=d.id;save();renderAll();document.querySelector('#fRef')?.focus();
}
function saveDecl(e){e.preventDefault();const d=selected();if(!d)return;const g=id=>document.querySelector(id)?.value||'';Object.assign(d,{ref:g('#fRef'),status:g('#fStatus'),orderNo:g('#fOrderNo'),customer:g('#fCustomer'),port:g('#fPort'),transport:g('#fTransport'),tradeMode:g('#fTradeMode'),exemption:g('#fExemption'),dealMode:g('#fDealMode'),settlement:g('#fSettlement'),broker:g('#fBroker'),declDate:g('#fDeclDate'),releaseDate:g('#fReleaseDate'),notes:g('#fNotes'),updatedAt:now()});d.activities.push({id:uid(),text:'更新报关信息',createdAt:now()});save();renderAll();document.querySelector('#saveHint').textContent=`已保存 ${nowText()}`;setTimeout(()=>document.querySelector('#saveHint').textContent='',2200);}
function saveGoods(){const d=selected();if(!d)return;const g=id=>document.querySelector(id)?.value||'';Object.assign(d,{cargoCN:g('#fCargoCN'),cargoEN:g('#fCargoEN'),hsCode:g('#fHsCode'),unit:g('#fUnit'),declQty:g('#fDeclQty'),declPrice:g('#fDeclPrice'),declTotal:g('#fDeclTotal'),currency:g('#fCurrency'),grossWt:g('#fGrossWt'),netWt:g('#fNetWt'),packages:g('#fPackages'),packType:g('#fPackType'),origin:g('#fOrigin'),dest:g('#fDest'),taxRate:g('#fTaxRate'),regCondition:g('#fRegCondition'),declElements:g('#fDeclElements'),updatedAt:now()});d.activities.push({id:uid(),text:'更新商品申报信息',createdAt:now()});save();renderAll();document.querySelector('#goodsSaveHint').textContent=`已保存 ${nowText()}`;setTimeout(()=>document.querySelector('#goodsSaveHint').textContent='',2200);}
function deleteDecl(){const d=selected();if(!d)return;if(!confirm(`确定删除 ${d.ref||'未填'}？`))return;state.decls=state.decls.filter(x=>x.id!==d.id);state.selectedId=state.decls[0]?.id||null;save();renderAll();}

function saveNode(){
  const d=selected();if(!d||!state.selectedNode)return;
  const st=d.steps[state.selectedNode];st.note=document.querySelector('#nodeNoteText').value.trim();
  const m=document.querySelector('#nodeReminderMonth').value,day=document.querySelector('#nodeReminderDay').value;
  const h=document.querySelector('#nodeReminderHour').value||'09',min=document.querySelector('#nodeReminderMinute').value||'00';
  if(m&&day){const y=new Date().getFullYear();st.date=`${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}T${h}:${min}`;}
  if(st.status==='pending')st.status='done';st.updatedAt=now();d.updatedAt=now();
  d.activities.push({id:uid(),text:`更新步骤：${STEPS.find(x=>x.id===state.selectedNode)?.name||''} → ${st.status==='done'?'已完成':'已备注'}`,createdAt:now()});
  save();state.selectedNode=null;document.querySelector('#nodeEditor').style.display='none';renderAll();
}
function clearNodeReminder(){const d=selected();if(!d||!state.selectedNode)return;d.steps[state.selectedNode].date='';d.steps[state.selectedNode].updatedAt=now();d.updatedAt=now();save();renderAll();}
function exportData(){const b=new Blob([JSON.stringify(state.decls,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`报关操作-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);}
function importData(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!Array.isArray(d))throw new Error('格式错误');state.decls=d;d.forEach(initDecl);state.selectedId=state.decls[0]?.id||null;save();renderAll();}catch(ex){alert('导入失败：'+ex.message);}};r.readAsText(f);e.target.value='';}

function bind(){
  document.querySelector('#newBtn')?.addEventListener('click',addDecl);document.querySelector('#emptyNewBtn')?.addEventListener('click',addDecl);
  document.querySelector('#deleteBtn')?.addEventListener('click',deleteDecl);document.querySelector('#customsForm')?.addEventListener('submit',saveDecl);
  document.querySelector('#issueForm')?.addEventListener('submit',addIssue);document.querySelector('#contactForm')?.addEventListener('submit',addContact);
  document.querySelector('#saveNodeNoteBtn')?.addEventListener('click',saveNode);document.querySelector('#clearNodeReminderBtn')?.addEventListener('click',clearNodeReminder);
  document.querySelector('#saveGoodsBtn')?.addEventListener('click',saveGoods);document.querySelector('#addTaxBtn')?.addEventListener('click',addTax);
  document.querySelector('#searchInput')?.addEventListener('input',renderList);document.querySelector('#statusFilter')?.addEventListener('change',renderList);
  document.querySelector('#exportBtn')?.addEventListener('click',exportData);document.querySelector('#importInput')?.addEventListener('change',importData);
}

populateSelects();load();bind();renderAll();
</script>
</body>
</html>
